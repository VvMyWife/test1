services:
  mineru-operator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: mineru-operator:latest
    container_name: mineru-operator
    restart: unless-stopped
    gpus: all
    shm_size: "8gb"
    environment:
      # Default true so one container can serve both OCR and Paddle modes.
      ENABLE_PADDLE_API: "${ENABLE_PADDLE_API:-true}"
      MINERU_API_MAX_CONCURRENT_REQUESTS: "${MINERU_API_MAX_CONCURRENT_REQUESTS:-128}"
      MINERU_MODEL_SOURCE: "${MINERU_MODEL_SOURCE:-modelscope}"
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
    ports:
      - "${MINERU_API_BIND:-127.0.0.1}:${MINERU_API_HOST_PORT:-8000}:8000"
      - "${PADDLE_TABLE_API_BIND:-127.0.0.1}:${PADDLE_TABLE_API_HOST_PORT:-8200}:8200"
    volumes:
      - ./data/input:/workspace/input
      - ./output:/workspace/output
      - ./.cache/mineru-operator:/workspace/.cache
      - ./logs:/workspace/logs
      - ./run:/workspace/run
